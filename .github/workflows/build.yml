name: Cordova APK Derleme

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Depoyu Kontrol Et
        uses: actions/checkout@v4

      - name: JDK 17 Kurulumu
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Node.js Kurulumu
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Android SDK Kurulumu
        run: |
          sudo apt-get update
          sudo apt-get install -y android-sdk
          echo "ANDROID_HOME=/usr/lib/android-sdk" >> $GITHUB_ENV

      - name: Cordova Yükle ve Derle
        run: |
          npm install -g cordova
          cordova platform add android
          cordova build android --release

      - name: APK'yı Yükle
        uses: actions/upload-artifact@v4
        with:
          name: kutu-kapat-apk
          path: platforms/android/app/build/outputs/apk/release/app-release.apk
